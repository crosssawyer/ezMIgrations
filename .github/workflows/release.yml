name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.2.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: ezmigrations-linux
            pyinstaller_args: --onefile --name ezmigrations
          - os: windows-latest
            artifact_name: ezmigrations-windows
            pyinstaller_args: --onefile --name ezmigrations
          - os: macos-latest
            artifact_name: ezmigrations-macos
            pyinstaller_args: --onefile --name ezmigrations

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyinstaller

      - name: Build executable
        run: pyinstaller ${{ matrix.pyinstaller_args }} main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag (manual dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git tag "v${{ github.event.inputs.version }}"
          git push origin "v${{ github.event.inputs.version }}"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          # Linux
          cp artifacts/ezmigrations-linux/ezmigrations release-assets/ezmigrations-linux
          chmod +x release-assets/ezmigrations-linux
          # Windows
          cp artifacts/ezmigrations-windows/ezmigrations.exe release-assets/ezmigrations-windows.exe
          # macOS
          cp artifacts/ezmigrations-macos/ezmigrations release-assets/ezmigrations-macos
          chmod +x release-assets/ezmigrations-macos

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ezMIgrations ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            release-assets/ezmigrations-linux
            release-assets/ezmigrations-windows.exe
            release-assets/ezmigrations-macos
